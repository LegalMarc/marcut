name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Forbid committed documents and local test artifacts
        run: |
          if git ls-files | grep -E -i '\.(docx|doc|pdf|dmg)$|^sample-files/'; then
            echo "::error::Documents and sample-files/ contents are confidential/local-only and must never be committed."
            exit 1
          fi
          echo "No forbidden artifacts tracked."

      - name: Version sync (pyproject.toml vs build-scripts/config.example.json)
        run: |
          python3 - <<'EOF'
          import json, re, sys
          m = re.search(r'^version\s*=\s*"([^"]+)"', open("pyproject.toml").read(), re.M)
          py_version = m.group(1) if m else ""
          cfg = json.load(open("build-scripts/config.example.json"))
          cfg_version = cfg.get("version", "")
          if not py_version or py_version != cfg_version:
              sys.exit(f"Version mismatch: pyproject.toml={py_version!r} vs config.example.json={cfg_version!r}")
          print(f"Version in sync: {py_version}")
          EOF

      - name: Ruff (full lint gate)
        run: |
          pip install ruff
          ruff check src/python tests

      - name: Help docs in sync (assets/*.md is canonical; regenerate, don't hand-edit the Swift copies)
        run: |
          python3 scripts/render_help_html.py
          # Only the .md fallback copies are tracked -- Resources/*.html is gitignored
          # (pure regenerated build output). If the .md copies are fresh, the HTML
          # rendering from them is deterministic and therefore fresh too.
          tracked=(
            "src/swift/MarcutApp/Sources/MarcutApp/Resources/help.md"
            "src/swift/MarcutApp/Sources/MarcutApp/Resources/forensics-guide.md"
          )
          if ! git diff --quiet -- "${tracked[@]}"; then
            echo "::error::assets/help.md or assets/forensics-guide.md is out of sync with the generated Swift Resources copies. Edit the assets/*.md source and run 'python3 scripts/render_help_html.py' to regenerate, then commit both the assets/ source and the Swift Resources .md copy."
            git diff -- "${tracked[@]}"
            exit 1
          fi
          echo "Help docs in sync."

  smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -e .
          pip install pytest
          python scripts/check_dependency_vulnerabilities.py requirements-pinned.txt
          python scripts/generate_python_sbom.py --check
          python scripts/check_markdown_links.py

      - name: Python smoke tests (rules-only)
        run: |
          pytest -q tests/test_rules.py tests/test_rule_filter.py tests/test_pii_eval_harness.py

      - name: Swift build (compile-only)
        run: |
          mkdir -p src/swift/MarcutApp/Sources/MarcutApp/Frameworks
          mkdir -p src/swift/MarcutApp/Sources/MarcutApp/python_site
          swift build --package-path src/swift/MarcutApp

      - name: SwiftFormat (lint gate)
        run: |
          brew install swiftformat
          swiftformat --lint src/swift/MarcutApp/Sources src/swift/MarcutApp/Tests
